cam_to_base:
    - [0.03777011, 0.77585638, -0.62977797, 0.90361032]
    - [0.99903069, -0.01505955, 0.04136291, -0.13823468]
    - [0.02260750, -0.63072980, -0.77567314, 0.62485432]
    - [0.0, 0.0, 0.0, 1.0]
camera_intrinsic: [609.09680176, 608.88891602, 639.61486816, 365.63900757]
distortion: [0.635826647, -2.91944551, 0.000952081464, -0.000327307062, 1.68455172, 0.512719929, -2.73880315, 1.60850489]

# Camera-frame workspace bounds.
workspace_min: [-0.5, -0.2, 0.0]
workspace_max: [ 0.5,  0.5, 0.9]

# Optional base-frame safety bounds.
# safe_workspace_min: [0.05, -0.25, 0.0]
# safe_workspace_max: [0.40,  0.25, 0.35]
# safe_eps: 0.002

# Joint limit per control step. A per-joint map also works here.
joint_delta_limit: 0.12
# joint_delta_limit:
#   shoulder_pan: 0.10
#   shoulder_lift: 0.08
#   elbow_flex: 0.08
#   wrist_flex: 0.10
#   wrist_roll: 0.15

voxel_size: 0.005

# Capsule radius per link in metres.
arm_filter:
  enabled: true
  capsule_radius:
    base_link: 0.05
    shoulder_link: 0.04
    upper_arm_link: 0.035
    lower_arm_link: 0.03
    wrist_link: 0.03

# Runtime settings.
num_action: 20
ensemble_mode: "act"
discretize_rotation: true
rot_step_size: 0.196
gripper_threshold: 0.02

# Must match the training checkpoint.
model:
  obs_feature_dim: 512
  hidden_dim: 512
  nheads: 8
  num_encoder_layers: 4
  num_decoder_layers: 1
  dropout: 0.1
