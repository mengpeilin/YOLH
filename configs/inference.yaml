# Camera calibration and deployment configuration
# Used by inference.py
camera_intrinsic: [603.0418701171875, 603.035400390625, 330.1463623046875, 243.86166381835938]
camera_serial: "147122075271"

cam_to_base:
  - [-0.4802232769739588, -0.34170456001833455,  0.8078512226363649,  0.302036088870308]
  - [-0.20183312039308804, -0.8532388525045358, -0.4808813284887785,  0.11299002053003587]
  - [ 0.8536093929689287, -0.39398154048054074,  0.34077786019018036,  0.2360758783325807]
  - [ 0.0, 0.0, 0.0, 1.0]

# ─── Workspace bounds (camera frame, metres) ───
workspace_min: [-0.5, -0.1, 0.0]
workspace_max: [ 0.5,  0.5, 1.0]

# ─── Safety bounds (base frame, metres) ───
# safe_workspace_min: [0.05, -0.25, 0.0]
# safe_workspace_max: [0.40,  0.25, 0.35]
# safe_eps: 0.002

# ─── Point cloud processing ───
voxel_size: 0.005           # metres per sparse voxel

# ─── Arm self-filter ───
# Bounding capsule radius per link (metres). Links not listed are skipped.
# The gripper links are NOT filtered (gripper is re-inserted synthetically).
arm_filter:
  enabled: true
  capsule_radius:
    base_link: 0.05
    shoulder_link: 0.04
    upper_arm_link: 0.035
    lower_arm_link: 0.03
    wrist_link: 0.03

# ─── Inference ───
num_action: 20              # action horizon
num_inference_step: 20      # DDIM steps
ensemble_mode: "act"        # temporal ensemble: new / old / avg / act / hato
discretize_rotation: true
rot_step_size: 0.196        # π/16 radians
gripper_threshold: 0.02     # metres – avoid sending gripper commands too often
max_steps: 300              # maximum inference steps per episode

# ─── Model architecture (must match training) ───
model:
  obs_feature_dim: 512
  hidden_dim: 512
  nheads: 8
  num_encoder_layers: 4
  num_decoder_layers: 1
  dropout: 0.1
